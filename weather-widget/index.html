<!DOCTYPE html>
<html lang="en">
<head>
    <title>Weather Widget</title>
    <!-- link my css file so the page is styled -->
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>

  <!-- this is the big box that holds everything -->
  <div class="container">

    <!-- this part is where the user types the zipcode -->
    <div class="input-container">
      <form>
        <input type="text" class="zipcode" placeholder="type zipcode here">
        <button type="button" class="search-button">Search</button>
      </form>
    </div>

    <!-- this part shows the city name, the temperature and the weather icon -->
    <div class="output-container">
      <h2 class="city_name">New York</h2>
      <p class="temperature">34</p>
      <img src="" alt="">
    </div>

  </div>

  <!-- load my secret api key first, then run the main code -->
  <script src="config.js"></script>
  <script src="javascript/main.js"></script>

</body>
</html>
